openapi: 3.1.0

info:
  title: Movie Hub API
  version: 1.2.0
  description: REST API for managing movies, comments, and ratings.

servers:
  - url: https://rest-api-movie-hub-latest.onrender.com
    description: Production server
  - url: http://localhost:8080
    description: Local development environment

tags:
  - name: Movies
    description: Movie management operations
  - name: Comments
    description: Movie comment operations
  - name: Ratings
    description: Movie rating operations
  - name: Categories
    description: Category management operations

security:
  - bearerAuth: []

paths:

  /v1/movies:
    get:
      tags: [Movies]
      summary: Get all movies
      description: Returns a paginated list of movies. Supports filtering by title, year, rating, and category.
      operationId: getMovies
      parameters:
        - name: title
          in: query
          description: Filter by movie title prefix match
          schema:
            type: string
        - name: year
          in: query
          description: Filter by release year
          schema:
            type: integer
        - name: minRating
          in: query
          description: Filter by minimum average rating
          schema:
            type: number
            format: double
        - name: maxRating
          in: query
          description: Filter by maximum average rating
          schema:
            type: number
            format: double
        - name: categoryId
          in: query
          description: Filter by category ID
          schema:
            type: integer
            format: int64
        - name: page
          in: query
          schema:
            type: integer
            default: 0
        - name: size
          in: query
          schema:
            type: integer
            default: 100
      responses:
        '200':
          description: Page of movies
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PageMovieResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /v1/movies/years:
    get:
      tags: [Movies]
      summary: Get distinct movie release years
      description: Returns a paginated list of unique release years from all movies, sorted descending.
      operationId: getMovieYears
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 0
        - name: size
          in: query
          schema:
            type: integer
            default: 50
      responses:
        '200':
          description: Page of unique release years
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PageInteger'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'

    post:
      tags: [Movies]
      summary: Create a new movie
      description: Admin-only. Creates a new movie.
      operationId: createMovie
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateMovieRequest'
      responses:
        '201':
          description: Movie created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MovieResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /v1/movies/{id}:
    get:
      tags: [Movies]
      summary: Get movie by ID
      operationId: getMovieById
      parameters:
        - $ref: '#/components/parameters/MovieId'
      responses:
        '200':
          description: Movie found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MovieResponse'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

    put:
      tags: [Movies]
      summary: Update a movie
      description: Admin-only.
      operationId: updateMovie
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/MovieId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateMovieRequest'
      responses:
        '200':
          description: Movie updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MovieResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

    delete:
      tags: [Movies]
      summary: Delete a movie
      description: Admin-only.
      operationId: deleteMovie
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/MovieId'
      responses:
        '204':
          description: Movie deleted
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /v1/movies/{id}/comments:
    get:
      tags: [Comments]
      summary: Get comments for a movie
      operationId: getCommentsByMovieId
      parameters:
        - $ref: '#/components/parameters/MovieId'
        - name: page
          in: query
          schema:
            type: integer
            default: 0
        - name: size
          in: query
          schema:
            type: integer
            default: 100
      responses:
        '200':
          description: Page of comments
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PageCommentResponse'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

    post:
      tags: [Comments]
      summary: Add a comment to a movie
      description: Authenticated users only.
      operationId: createComment
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/MovieId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateCommentRequest'
      responses:
        '201':
          description: Comment created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CommentResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /v1/movies/{movieId}/comments/{commentId}:
    delete:
      tags: [Comments]
      summary: Delete a comment
      description: Admin or comment author only.
      operationId: deleteComment
      security:
        - bearerAuth: []
      parameters:
        - name: movieId
          in: path
          required: true
          schema:
            type: integer
            format: int64
        - name: commentId
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '204':
          description: Comment deleted
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /v1/movies/{id}/ratings:
    get:
      tags: [Ratings]
      summary: Get ratings for a movie
      operationId: getRatingsByMovieId
      parameters:
        - $ref: '#/components/parameters/MovieId'
        - name: page
          in: query
          schema:
            type: integer
            default: 0
        - name: size
          in: query
          schema:
            type: integer
            default: 100
      responses:
        '200':
          description: Page of ratings
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PageRatingResponse'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

    post:
      tags: [Ratings]
      summary: Rate a movie
      description: Authenticated users only. One rating per user per movie.
      operationId: createRating
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/MovieId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateRatingRequest'
      responses:
        '201':
          description: Rating created or updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RatingResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /v1/comments:
    get:
      tags: [Comments]
      summary: Get all comments (admin)
      description: Admin-only. Returns paginated comments ordered by newest first, with optional user and text filters.
      operationId: getAllComments
      security:
        - bearerAuth: []
      parameters:
        - name: username
          in: query
          description: Filter by username (contains, case-insensitive)
          schema:
            type: string
        - name: text
          in: query
          description: Fulltext search in comment text (contains, case-insensitive)
          schema:
            type: string
        - name: page
          in: query
          schema:
            type: integer
            default: 0
        - name: size
          in: query
          schema:
            type: integer
            default: 100
      responses:
        '200':
          description: Page of comments
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PageCommentResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /v1/categories:
    get:
      tags: [Categories]
      summary: Get all categories
      description: Returns a paginated list of categories.
      operationId: getCategories
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 0
        - name: size
          in: query
          schema:
            type: integer
            default: 100
      responses:
        '200':
          description: Page of categories
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PageCategoryResponse'
        '500':
          $ref: '#/components/responses/InternalServerError'

    post:
      tags: [Categories]
      summary: Create a new category
      description: Admin-only. Creates a new category.
      operationId: createCategory
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateCategoryRequest'
      responses:
        '201':
          description: Category created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CategoryResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '409':
          $ref: '#/components/responses/Conflict'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /v1/categories/{id}:
    put:
      tags: [Categories]
      summary: Update a category
      description: Admin-only.
      operationId: updateCategory
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/CategoryId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateCategoryRequest'
      responses:
        '200':
          description: Category updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CategoryResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

    delete:
      tags: [Categories]
      summary: Delete a category
      description: Admin-only.
      operationId: deleteCategory
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/CategoryId'
      responses:
        '204':
          description: Category deleted
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

components:

  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  parameters:
    MovieId:
      name: id
      in: path
      required: true
      description: Movie identifier
      schema:
        type: integer
        format: int64
    CategoryId:
      name: id
      in: path
      required: true
      description: Category identifier
      schema:
        type: integer
        format: int64

  responses:
    BadRequest:
      description: Invalid request
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/ProblemDetail'
    Unauthorized:
      description: Authentication required
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/ProblemDetail'
    Forbidden:
      description: Access denied
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/ProblemDetail'
    NotFound:
      description: Resource not found
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/ProblemDetail'
    Conflict:
      description: Resource already exists
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/ProblemDetail'
    InternalServerError:
      description: Internal server error
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/ProblemDetail'

  schemas:

    CreateMovieRequest:
      type: object
      required:
        - title
        - imageUrl
        - releaseYear
        - categoryId
      properties:
        title:
          type: string
          minLength: 1
          example: "Inception"
        imageUrl:
          type: string
          format: uri
          minLength: 1
          example: "https://example.com/inception.jpg"
        description:
          type: string
          example: "A mind-bending thriller"
        releaseYear:
          type: integer
          example: 2010
        categoryId:
          type: integer
          format: int64
          example: 1


    UpdateMovieRequest:
      type: object
      required:
        - title
        - imageUrl
        - releaseYear
        - categoryId
      properties:
        title:
          type: string
          minLength: 1
          example: "Inception"
        imageUrl:
          type: string
          format: uri
          minLength: 1
          example: "https://example.com/inception.jpg"
        description:
          type: string
          example: "A mind-bending thriller"
        releaseYear:
          type: integer
          example: 2010
        categoryId:
          type: integer
          format: int64
          example: 1


    MovieResponse:
      type: object
      properties:
        id:
          type: integer
          format: int64
        title:
          type: string
        imageUrl:
          type: string
          format: uri
        description:
          type: string
        releaseYear:
          type: integer
        categoryId:
          type: integer
          format: int64
        categoryName:
          type: string
        averageRating:
          type: number
          format: double
        ratingsCount:
          type: integer
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    PageMovieResponse:
      type: object
      description: Page envelope for MovieResponse results, matching Spring Data Page<MovieResponse>.
      properties:
        content:
          type: array
          items:
            $ref: '#/components/schemas/MovieResponse'
        totalElements:
          type: integer
          format: int64
        totalPages:
          type: integer
        size:
          type: integer
        number:
          type: integer

    PageInteger:
      type: object
      description: Page envelope for integer results (e.g. distinct release years).
      properties:
        content:
          type: array
          items:
            type: integer
        totalElements:
          type: integer
          format: int64
        totalPages:
          type: integer
        size:
          type: integer
        number:
          type: integer

    PageCategoryResponse:
      type: object
      description: Page envelope for CategoryResponse results, matching Spring Data Page<CategoryResponse>.
      properties:
        content:
          type: array
          items:
            $ref: '#/components/schemas/CategoryResponse'
        totalElements:
          type: integer
          format: int64
        totalPages:
          type: integer
        size:
          type: integer
        number:
          type: integer

    CreateCommentRequest:
      type: object
      required:
        - text
      properties:
        text:
          type: string
          minLength: 1
          example: "Great movie!"

    CommentResponse:
      type: object
      properties:
        id:
          type: integer
          format: int64
        movieId:
          type: integer
          format: int64
        userId:
          type: string
        username:
          type: string
        text:
          type: string
        createdAt:
          type: string
          format: date-time

    PageCommentResponse:
      type: object
      description: Page envelope for CommentResponse results, matching Spring Data Page<CommentResponse>.
      properties:
        content:
          type: array
          items:
            $ref: '#/components/schemas/CommentResponse'
        totalElements:
          type: integer
          format: int64
        totalPages:
          type: integer
        size:
          type: integer
        number:
          type: integer

    CreateRatingRequest:
      type: object
      required:
        - score
      properties:
        score:
          type: integer
          minimum: 1
          maximum: 10
          example: 8

    RatingResponse:
      type: object
      properties:
        id:
          type: integer
          format: int64
        movieId:
          type: integer
          format: int64
        userId:
          type: string
        username:
          type: string
        score:
          type: integer
        createdAt:
          type: string
          format: date-time

    PageRatingResponse:
      type: object
      description: Page envelope for RatingResponse results, matching Spring Data Page<RatingResponse>.
      properties:
        content:
          type: array
          items:
            $ref: '#/components/schemas/RatingResponse'
        totalElements:
          type: integer
          format: int64
        totalPages:
          type: integer
        size:
          type: integer
        number:
          type: integer

    CreateCategoryRequest:
      type: object
      required:
        - name
      properties:
        name:
          type: string
          minLength: 1
          example: "Sci-Fi"

    UpdateCategoryRequest:
      type: object
      required:
        - name
      properties:
        name:
          type: string
          minLength: 1
          example: "Sci-Fi"

    CategoryResponse:
      type: object
      properties:
        id:
          type: integer
          format: int64
        name:
          type: string

    ProblemDetail:
      type: object
      description: RFC 9457 Problem Details
      properties:
        type:
          type: string
          format: uri
        title:
          type: string
        status:
          type: integer
        detail:
          type: string
        instance:
          type: string
          format: uri
      additionalProperties: true
